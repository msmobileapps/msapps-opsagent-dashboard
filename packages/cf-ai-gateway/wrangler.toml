name = "opsagent-ai-gateway"
main = "src/index.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Workers AI binding — enables env.AI.run() for lightweight inference
[ai]
binding = "AI"

# Observability — real-time logs in CF dashboard
[observability]
enabled = true

# Environment variables (non-secret)
[vars]
ALLOWED_ORIGINS = "https://ilcf-medinfo-demo.netlify.app,https://ilcf-medinfo.netlify.app,https://opsagent-dashboard.netlify.app,http://localhost:5173"
CLOUD_RUN_ENDPOINT = "https://opsagent-ai-runtime-zadkrinzra-uc.a.run.app"
CLOUD_RUN_MODEL = "gemma3:4b"

# Secrets (set via `npx wrangler secret put <NAME>`):
#   API_TOKEN (bearer auth for this gateway)

# Staging environment
[env.staging]
name = "opsagent-ai-gateway-staging"
